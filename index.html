<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Hexa</title>
</head>
<body>

    <div class="logo">
        <img src="img/logo.png" alt="Hexa Logo">
    </div>

    <h1>Social Network for Ethical Hackers</h1>

    <div class="main-wrapper">
        <form id="loginForm">
            <h2>Login</h2>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="login_email" name="email" placeholder="John Doe" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="login_lozinka" name="password" placeholder="••••••••" required>
            </div>

            <div>
                <button type="submit">Login</button>
            </div>
        </form>
    </div>
    
    <div class="no-acc-register">
        <p>Don't have an account?</p>
        <button id="registracija">Register</button>
    </div>
</body>
</html>
